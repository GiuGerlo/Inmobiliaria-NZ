<VirtualHost *:80>
    ServerName localhost
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Bloquear acceso al .env y otros sensibles (defensa en profundidad además de .htaccess)
    <FilesMatch "^\.env">
        Require all denied
    </FilesMatch>

    <FilesMatch "\.(sql|md|log|sh)$">
        Require all denied
    </FilesMatch>

    # No servir el dump ni el .git
    <DirectoryMatch "/var/www/html/(\.git|db|docker|docs|\.github|\.claude)">
        Require all denied
    </DirectoryMatch>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
