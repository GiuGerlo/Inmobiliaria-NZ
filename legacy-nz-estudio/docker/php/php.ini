; Configuración PHP para entorno Docker (desarrollo local nz-estudio)
; Carga después de los .ini por defecto (prefijo zz- en el filename).

; --- Uploads ---
upload_max_filesize = 20M
post_max_size = 22M
max_file_uploads = 30

; --- Memoria y ejecución ---
memory_limit = 256M
max_execution_time = 60
max_input_time = 60

; --- Errores: visibles en dev ---
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /var/log/apache2/php-error.log

; --- Sesión ---
session.cookie_httponly = 1
session.cookie_samesite = Lax
session.use_strict_mode = 1
session.gc_maxlifetime = 7200

; --- Timezone ---
; Política: el server SIEMPRE opera en UTC.
; La UI formatea a America/Argentina/Cordoba con el helper nz_fmt_ar().
date.timezone = UTC

; --- Charset ---
default_charset = UTF-8

; --- Opcache: activo en dev pero con revalidate frecuente ---
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.revalidate_freq = 0
opcache.validate_timestamps = 1

; --- Seguridad básica ---
expose_php = Off
allow_url_fopen = On
allow_url_include = Off
