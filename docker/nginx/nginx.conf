# Inmobiliaria NZ — nginx gateway para dev
# / y assets de Vite          -> node-dev:5173
# /api/*                       -> php-fpm:9000 (Laravel public/index.php)

upstream vite_upstream {
    server node-dev:5173;
}

upstream php_upstream {
    server php-fpm:9000;
}

server {
    listen 80;
    server_name _;

    root /var/www/api/public;
    index index.php;

    client_max_body_size 32m;

    # ----- API Laravel -----
    location /api/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Sanctum CSRF cookie (la SPA lo llama antes del login)
    location /sanctum/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Docs OpenAPI (scramble) — Laravel las sirve solo en entorno local
    location /docs/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Archivos públicos de Laravel (fotos de propiedades, etc.)
    # alias directo al disk "public" — sin symlink storage:link (bind mount Windows)
    location /storage/ {
        alias /var/www/api/storage/app/public/;
        try_files $uri =404;
    }

    # Manejo de index.php (entry point Laravel)
    location ~ ^/index\.php(/|$) {
        fastcgi_pass php_upstream;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 120;
    }

    # ----- Vite dev: rutas y assets -----
    # HMR vía WebSocket
    location /@vite/ {
        proxy_pass http://vite_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /@react-refresh {
        proxy_pass http://vite_upstream;
    }

    location /node_modules/ {
        proxy_pass http://vite_upstream;
    }

    location /src/ {
        proxy_pass http://vite_upstream;
    }

    location /@id/ {
        proxy_pass http://vite_upstream;
    }

    location /@fs/ {
        proxy_pass http://vite_upstream;
    }

    # ----- Default: SPA React (Vite) -----
    location / {
        proxy_pass http://vite_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
